version: '3.8'

services:
  # Backend Node.js
  backend:
    build: .
    container_name: backend-app
    ports:
      - "3000:3000"
    environment:
      - SEQUELIZE_HOST=mysql
      - SEQUELIZE_USER=root
      - SEQUELIZE_PASSWORD=rootpassword
      - SEQUELIZE_DB=erp_database
      - SESSION_KEY=JFv+gnlhB9ybD*By
      - PORT=3000
    depends_on:
      mysql:
        condition: service_healthy  # ✅ Espera a que MySQL esté SALUDABLE
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - app-network
    restart: on-failure  # ✅ Reintentar si falla

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=erp_database
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:  # Verify
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    environment:
      - PMA_HOST=mysql
      - PMA_PORT=3306
      - PMA_USER=root
      - PMA_PASSWORD=rootpassword
    ports:
      - "8080:80"
    depends_on:
      mysql:
        condition: service_healthy  #
    networks:
      - app-network

volumes:
  mysql_data:

networks:
  app-network:
    driver: bridge