<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Catálogo de Productos</title>
 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/sales.css" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <script src='/js/products/jquery-products.js'></script> 
  </head>
  <body>

   <div class="container-fluid">
       <div class="row"></div> 

       <div class="row text-center m-4">
        <h1> Productos</h1>
       </div>
       <div class="row mt-4">
        <div class="table-responsive">
            <table id="maintable" class=" table table-striped">
              <thead class="table-dark">
                <tr>  
                 <th scope="col">Nombre</th>
                  <th scope="col">Descripción</th>
                  <th scope="col">Precio</th>
                  <th scope="col">Acción</th>
                </tr>
              </thead>

              <tbody>
                
             </tbody>
            </table> 
        </div>  
      </div>

   </div>

     <!-- MODAL -->
     <div id="modal" class="modal" tabindex="-1">
     <div class="modal-dialog">
       <div class="modal-content">
         <div class="modal-header">
           <h5 class="modal-title">Actualización de Precio</h5>
           <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
         </div>
         <div class="modal-body">
           <p> El cambio en el precio de producto actualizará también las Ventas realizadas</p>
         </div>
         <div class="modal-footer">
          <button id="saveBtn" type="button" class="btn btn-primary">Salvar</button> 
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
           
         </div>
       </div>
     </div>
   </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
 
 
  </body>
</html>
