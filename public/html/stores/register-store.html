<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Agregar nuevo Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <link rel="stylesheet" href="/css/sales.css" />
    <script src='/js/stores/jquery-store-register.js'></script>
  </head>
  <body>

    <div class="container-fluid text-center">

    <h1>Agregar nueva Tienda</h1> 
      <div class="row  ">
         <div class="col"></div>   
         <div id="maincol" class="col-8 align-items-center">
           <form id="storeform">

              <div class="row">
               <div class="col gy-5">
                <label>Nombre</label>    
               </div>
               <div class="col gy-5">
                <input id="storename" type="text" class="form-control" >
               </div>
              </div>

              <div class="row">
                <div class="col gy-5">
                 <label>Dirección</label>    
                </div>
                <div class="col gy-5">
                 <input id="address" type="text" class="form-control" >
                </div>
               </div>

                
               <div class="row ">
                <div class="col gy-5 d-grid">
                  <button class="btn btn-primary" type="submit">Button</button>  
                </div>   
               </div>

           </form>
         </div>   
         <div class="col"></div>   
      </div>

       <!-- Modal -->

       
       <div id="storemodal" class="modal" tabindex="-1">
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title">Modal title</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <p>Modal body text goes here.</p>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-success">Guardar</button>
              <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Cancelar</button>
  
            </div>
          </div>
        </div>
      </div>        
       



  </div>
    


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  </body>
</html>
