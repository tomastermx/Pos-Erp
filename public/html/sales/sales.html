<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ventas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <script src='/js/sales/jquery-sales.js'></script>  
  </head>
  <body>
  
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>


    <div id="maincontent" class="container-fluid text-center">
      


      <h1>Todas las Ventas</h1>    

      <form id="mainform" class="form-control form-control"> 
       <div class="row g-3">
                
        <div class="col-sm">
          <select id="select"  class="form-select" aria-label="Default select example">
           
            <option selected value=""></option>
     
         </select>
       </div>



        <div class="col-sm d-grid gap-2 " >
          <button  type="submit"  id ="search" class="btn btn-outline-primary">Buscar</button>
        </div> 

        <div class="col-sm d-grid gap-2 " >
          <button  type="button"  id ="csv" class="btn btn-outline-primary">Descargar CSV</button>
        </div> 



        </div>
      </form>     

      
         <table  id="maintable" class="table table-striped">
         
        
  
          <thead class="table-dark">
            <tr>
              <th scope="col">Fecha de Venta</th>
              <th scope="col">Sucursal</th>

            </tr>
          </thead>
          <tbody>

          </tbody>
        </table>

        <!--Modal Aqui --> 

        <div id="csvModal" class="modal" tabindex="-1">
          <div class="modal-dialog">
            <div class="modal-content">
              <div class="modal-header">
                <h5 class="modal-title">Exportar CSV</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
              </div>
              <div class="modal-body">
                <form>
                  <select id="limit" class="form-select" aria-label="Default select example">
                    <option selected> Número de registros de ventas</option>
                    <option value="2">50</option>
                    <option value="200">200</option>
                    <option value="All">Todas</option>
                  </select>
                </form>
              </div>
              <div class="modal-footer">
                <button id="csvBtn" type="button" class="btn btn-success" data-bs-dismiss="modal">Exportar Csv</button>
          
              </div>
            </div>
          </div>
        </div>
         <!--Termina Modal-->


       </div>

  
     
    </body>
</html>
