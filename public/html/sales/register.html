<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nueva Compra</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <link rel="stylesheet" href="/css/sales.css" />
    <script src='/js/sales/jquery-sales-register.js'></script>   
     <style>

    </style>
  

  </head>

  <body>
  <div id ="main" class="bg-light"> 


    

         <div class="row text-center">
          <h1>Registrar Nueva Compra</h1>
         </div>
    

    
         <div  class="container text-center   align-items-center">
          <form id="myform" >
         
           <div class="row ">
           <div class="col"></div>

          <div id ="maincol" class="col-6  gy-4 bg-white ">

         


          <div class="row  align-items-center">
            <div class="col gy-4">
            
              <select id="selection" class="form-select" aria-label="Default select example">
                <option  value="" selected>Seleccionar tienda</option>
                <option value="1">One</option>
                <option value="2">Two</option>
                <option value="3">Three</option>
              </select>

          </div>
          </div>

           

            
            <div class="row  align-items-center">
              <div class="col-md gy-4 d-grid ">
              <button id="submitBtn" class="btn btn-primary" type="submit">Enviar</button>
            </div>
            </div>


          </form> 


         </div>


          <div class="col"></div>
          
         
        <!-- Modal -->


        <div id="saleModal" class="modal" tabindex="-1">
          <div class="modal-dialog">
            <div class="modal-content">
              <div class="modal-header">
                <h5 class="modal-title">Se creará una Venta nueva</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
              </div>
              <div class="modal-body">
                <p> Usted Esta a punto de Registrar una nueva venta</p>

              </div>
              <div class="modal-footer">
                <button id="confirmSaleBtn" type="button" class="btn btn-success"> Aceptar</button>
                <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Cancelar</button>
               
              </div>
            </div>
          </div>
        </div>  

          


      

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
  </div> 
  </body>
</html>
